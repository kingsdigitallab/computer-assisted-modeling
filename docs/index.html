<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component Tree Editor</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
  color: #333;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: #2c3e50;
  color: #ecf0f1;
  flex-shrink: 0;
}

header h1 { font-size: 16px; font-weight: 600; }

.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}

.btn-primary { background: #3498db; color: #fff; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #219a52; }

.toolbar { display: flex; gap: 8px; }

#container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#tree-pane {
  width: 400px;
  min-width: 280px;
  flex-shrink: 0;
  border-right: 2px solid #ddd;
  display: flex;
  flex-direction: column;
  background: #fff;
}

#tree-header {
  padding: 8px 12px;
  border-bottom: 1px solid #ddd;
  font-size: 13px;
  font-weight: 600;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafafa;
}

#tree-content {
  flex: 1;
  overflow: auto;
  padding: 8px 0;
}

.tree-node {
  display: flex;
  align-items: center;
  padding: 2px 8px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

.tree-node:hover { background: #e8f4fd; }
.tree-node.selected { background: #d4e6f9; font-weight: 600; }

.tree-toggle {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  color: #888;
  border-radius: 3px;
  transition: background 0.15s;
}

.tree-toggle:hover { background: #ddd; }

.tree-toggle.leaf { visibility: hidden; }

.tree-label {
  font-size: 13px;
  padding: 1px 4px;
  border-radius: 3px;
  border: 1px solid transparent;
  outline: none;
  min-width: 40px;
}

.tree-label:focus {
  border-color: #3498db;
  background: #fff;
}

.tree-actions {
  display: flex;
  gap: 2px;
  margin-left: auto;
  opacity: 0;
  transition: opacity 0.15s;
}

.tree-node:hover .tree-actions { opacity: 1; }

.tree-action-btn {
  width: 20px;
  height: 20px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: #888;
}

.tree-action-btn:hover { background: #ddd; color: #333; }
.tree-action-btn.delete:hover { background: #e74c3c; color: #fff; }

.tree-children { margin-left: 16px; }

.resize-handle {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
}

.resize-handle:hover { background: #3498db; }

#graph-pane {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #fff;
}

#graph-pane svg { width: 100%; height: 100%; }

.node-bubble {
  cursor: pointer;
}

.node-bubble:hover { filter: brightness(1.1); }

.node-text {
  font-size: 11px;
  font-weight: 500;
  pointer-events: none;
  fill: #fff;
  text-anchor: middle;
  dominant-baseline: central;
}

.link {
  fill: none;
  stroke: #ccc;
  stroke-width: 1.5px;
}

.graph-hint {
  position: absolute;
  bottom: 12px;
  left: 12px;
  font-size: 11px;
  color: #999;
  pointer-events: none;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #999;
  font-size: 14px;
}

.tree-node.selected .tree-actions { opacity: 1; }

#graph-edit-input {
  position: absolute;
  display: none;
  z-index: 500;
  border: 2px solid #3498db;
  border-radius: 6px;
  background: #fff;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: #333;
  outline: none;
  padding: 0 4px;
}

.context-menu {
  position: fixed;
  z-index: 1000;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  padding: 4px 0;
  display: none;
  min-width: 150px;
  font-size: 13px;
}

.context-menu-item {
  padding: 6px 14px;
  cursor: pointer;
  user-select: none;
}

.context-menu-item:hover { background: #ecf0f1; }
.context-menu-item.danger { color: #e74c3c; }
.context-menu-item.danger:hover { background: #fdecea; }
</style>
</head>
<body>

<header>
  <h1>Component Tree</h1>
  <div class="toolbar">
    <button class="btn btn-primary" id="fit-btn">Fit View</button>
    <button class="btn btn-success" id="export-btn">Export YAML</button>
  </div>
</header>

<div id="container">
  <div id="tree-pane">
    <div id="tree-header">
      <span>Tree Editor</span>
      <button class="btn btn-primary" id="add-root-btn" style="padding:3px 8px;font-size:12px;">+ Root</button>
    </div>
    <div id="tree-content"></div>
  </div>
  <div class="resize-handle" id="resize-handle"></div>
  <div id="graph-pane">
    <svg id="graph-svg"></svg>
    <input id="graph-edit-input" type="text" autocomplete="off">
    <div class="graph-hint" style="bottom:auto;top:12px;">Tab: add child · Enter: add sibling · F2: rename · Del: delete · Arrows: navigate</div>
    <div class="graph-hint">Scroll: zoom · Drag: pan · Click: select · Double-click: rename · Right-click: menu</div>
  </div>
</div>
<div id="context-menu" class="context-menu"></div>

<script>
const YAML_URL = "../data/components.yml";

let treeData = {};
let selectedNodeId = null;
let activePane = "tree";
let idCounter = 0;
const nodeMap = new Map();

function generateId() { return "n" + (idCounter++); }

function assignIds(node) {
  node._id = generateId();
  node._children = node.children || [];
  node._expanded = true;
  nodeMap.set(node._id, node);
  for (const child of node._children) assignIds(child);
}

/* ── YAML Parser ─────────────────────────────────── */
function parseYaml(text) {
  const lines = text.split("\n");
  const root = { name: "root", children: [] };
  const stack = [{ indent: -1, node: root }];

  for (const raw of lines) {
    if (raw.trim() === "" || raw.trim().startsWith("#")) continue;
    const indent = raw.search(/\S/);
    const line = raw.trim();

    let key, val;
    if (line.endsWith(": {}") || line === "{}") {
      key = line.replace(/: \{\}$/, "").replace(/\{\}/, "").trim();
      val = null;
    } else if (line.endsWith(":")) {
      key = line.slice(0, -1).trim();
      val = {};
    } else if (line.includes(": ")) {
      const idx = line.indexOf(": ");
      key = line.slice(0, idx).trim();
      val = line.slice(idx + 2).trim();
    } else {
      key = line;
      val = null;
    }

    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
    const parent = stack[stack.length - 1].node;

    const child = { name: key, children: [] };
    if (val === null) child.children = [];
    parent.children.push(child);
    stack.push({ indent, node: child });
  }

  if (root.children.length === 1) return root.children[0];
  return root;
}

/* ── YAML Serializer ─────────────────────────────── */
function serializeYaml(node, depth = 0) {
  const indent = "  ".repeat(depth);
  if (!node.children || node.children.length === 0) {
    return `${indent}${node.name}: {}\n`;
  }
  let out = `${indent}${node.name}:\n`;
  for (const child of node.children) {
    out += serializeYaml(child, depth + 1);
  }
  return out;
}

/* ── Tree Data → D3 hierarchy ────────────────────── */
function toD3Data(node) {
  const d = { name: node.name, _id: node._id, _orig: node };
  if (node._expanded && node._children && node._children.length > 0) {
    d.children = node._children.map(toD3Data);
  }
  return d;
}

/* ── Tree Editor (Left Pane) ─────────────────────── */
function renderTreeEditor() {
  const container = document.getElementById("tree-content");
  container.innerHTML = "";
  if (treeData && treeData.name) {
    container.appendChild(buildTreeNode(treeData, 0));
  }
}

function buildTreeNode(node, depth) {
  const hasChildren = node._children && node._children.length > 0;
  const wrapper = document.createElement("div");

  const row = document.createElement("div");
  row.className = "tree-node" + (selectedNodeId === node._id ? " selected" : "");
  row.dataset.id = node._id;
  row.style.paddingLeft = (8 + depth * 16) + "px";
  row.addEventListener("mousedown", () => { activePane = "tree"; });
  row.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    selectNode(node._id);
    showContextMenu(e.clientX, e.clientY, node._id, "tree");
  });
  row.addEventListener("click", () => { label.focus(); });

  const toggle = document.createElement("span");
  toggle.className = "tree-toggle" + (hasChildren ? "" : " leaf");
  toggle.textContent = node._expanded ? "\u25BC" : "\u25B6";
  toggle.addEventListener("click", (e) => {
    e.stopPropagation();
    node._expanded = !node._expanded;
    renderTreeEditor();
    renderGraph();
  });
  row.appendChild(toggle);

  const label = document.createElement("span");
  label.className = "tree-label";
  label.textContent = node.name;
  label.contentEditable = true;
  label.spellcheck = false;
  label.addEventListener("focus", (e) => {
    e.stopPropagation();
    selectNode(node._id);
  });
  label.addEventListener("blur", () => {
    const newName = label.textContent.trim();
    if (newName && newName !== node.name) {
      node.name = newName;
      renderGraph();
    }
  });
  label.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault(); e.stopPropagation();
      label.blur();
      addSibling(node, { editIn: "tree" });
    } else if (e.key === "Tab") {
      e.preventDefault(); e.stopPropagation();
      label.blur();
      addChild(node, { editIn: "tree" });
    } else if (e.key === "Escape") {
      e.preventDefault(); e.stopPropagation();
      label.textContent = node.name;
      label.blur();
    }
  });
  row.appendChild(label);

  const actions = document.createElement("span");
  actions.className = "tree-actions";

  const addBtn = document.createElement("button");
  addBtn.className = "tree-action-btn";
  addBtn.textContent = "+";
  addBtn.title = "Add child (Tab)";
  addBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    addChild(node, { editIn: "tree" });
  });
  actions.appendChild(addBtn);

  const sibBtn = document.createElement("button");
  sibBtn.className = "tree-action-btn";
  sibBtn.textContent = "\u21B5";
  sibBtn.title = "Add sibling (Enter)";
  sibBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    addSibling(node, { editIn: "tree" });
  });
  actions.appendChild(sibBtn);

  if (depth > 0) {
    const delBtn = document.createElement("button");
    delBtn.className = "tree-action-btn delete";
    delBtn.textContent = "\u2715";
    delBtn.title = "Delete (Del)";
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteNodeWithConfirm(node);
    });
    actions.appendChild(delBtn);
  }

  row.appendChild(actions);
  wrapper.appendChild(row);

  if (hasChildren && node._expanded) {
    const childContainer = document.createElement("div");
    childContainer.className = "tree-children";
    for (const child of node._children) {
      childContainer.appendChild(buildTreeNode(child, depth + 1));
    }
    wrapper.appendChild(childContainer);
  }

  return wrapper;
}

function selectNode(id) {
  selectedNodeId = id;
  document.querySelectorAll("#tree-content .tree-node").forEach(el => {
    el.classList.toggle("selected", el.dataset.id === id);
  });
  highlightGraphNode(id);
}

function deleteNode(id) {
  if (!treeData) return null;
  if (treeData._id === id) {
    treeData = { name: "root", children: [], _id: generateId(), _expanded: true, _children: [] };
    nodeMap.clear();
    nodeMap.set(treeData._id, treeData);
    return treeData;
  }
  const parent = findParent(treeData, id);
  const removed = removeFromTree(treeData, id);
  if (removed) nodeMap.delete(id);
  return parent;
}

function removeFromTree(node, id) {
  if (!node._children) return false;
  const idx = node._children.findIndex(c => c._id === id);
  if (idx !== -1) { node._children.splice(idx, 1); return true; }
  for (const child of node._children) {
    if (removeFromTree(child, id)) return true;
  }
  return false;
}

function findNode(id) { return nodeMap.get(id) || null; }

/* ── Radial Graph (Right Pane) ───────────────────── */
let svg, gZoom, gLinks, gNodes, zoomBehavior;

const MAX_CHARS = 13;
const CHAR_W = 6.1;
const LINE_H = 13;
const PAD_X = 9;
const PAD_Y = 6;
const MIN_BUBBLE_W = 34;
const RADIAL_GAP = 36;
const TANG_GAP = 12;

function initGraph() {
  const svgEl = document.getElementById("graph-svg");
  svg = d3.select(svgEl);
  svg.selectAll("*").remove();

  const width = svgEl.clientWidth;
  const height = svgEl.clientHeight;

  gZoom = svg.append("g");
  zoomBehavior = d3.zoom()
    .scaleExtent([0.2, 5])
    .on("zoom", (e) => gZoom.attr("transform", e.transform));
  svg.call(zoomBehavior);
  svg.on("dblclick.zoom", null);

  gLinks = gZoom.append("g").attr("class", "links");
  gNodes = gZoom.append("g").attr("class", "nodes");

  svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(width / 2, height / 2));
}

/* Wrap a node name into up to 3 lines of <= MAX_CHARS, appending an ellipsis if truncated. */
function wrapLabel(text) {
  const MAX_LINES = 3;
  const words = String(text).split(/\s+/).filter(Boolean);
  const lines = [];
  for (const w of words) {
    if (lines.length >= MAX_LINES) break;
    const last = lines[lines.length - 1];
    if (last && (last + " " + w).length <= MAX_CHARS) {
      lines[lines.length - 1] = last + " " + w;
    } else if (w.length <= MAX_CHARS) {
      lines.push(w);
    } else {
      let rest = w;
      while (rest.length > MAX_CHARS && lines.length < MAX_LINES) {
        lines.push(rest.slice(0, MAX_CHARS));
        rest = rest.slice(MAX_CHARS);
      }
      if (rest && lines.length < MAX_LINES) lines.push(rest);
    }
  }
  if (lines.length > MAX_LINES) lines.length = MAX_LINES;
  if (lines.join(" ").length < String(text).trim().length) {
    let last = lines[lines.length - 1] || "";
    if (last.length > MAX_CHARS - 1) last = last.slice(0, MAX_CHARS - 1);
    lines[lines.length - 1] = last + "\u2026";
  }
  return lines.filter(Boolean);
}

/* Compute wrapped lines and bubble dimensions for every node in the hierarchy. */
function computeBubbleSizes(root) {
  root.descendants().forEach(d => {
    d._lines = wrapLabel(d.data.name);
    const maxLen = d._lines.length ? Math.max(...d._lines.map(l => l.length)) : 0;
    d._bw = Math.max(maxLen * CHAR_W + PAD_X * 2, MIN_BUBBLE_W);
    d._bh = d._lines.length * LINE_H + PAD_Y * 2;
  });
}

/* Assign a radius to each depth so adjacent levels never overlap radially and
   bubbles within a level never overlap tangentially.

   The radius is derived from the ACTUAL angular gaps produced by d3.tree (not
   a uniform spread): for every adjacent pair of nodes on a ring we compute the
   smallest radius at which the two bubbles (using their real widths/heights)
   just touch, then take the maximum across the ring. This makes dense clusters
   (e.g. a parent with many children) drive the ring size, so their bubbles no
   longer collide. Rings below also keep a safe radial gap (maxH + RADIAL_GAP). */
function computeLevelRadii(root) {
  const TWO_PI = 2 * Math.PI;
  let maxDepth = 0;
  root.descendants().forEach(d => { if (d.depth > maxDepth) maxDepth = d.depth; });

  const maxH = Math.max(...root.descendants().map(d => d._bh));

  const byDepth = {};
  root.descendants().forEach(d => {
    (byDepth[d.depth] ||= []).push(d);
  });
  for (const k in byDepth) byDepth[k].sort((a, b) => a.x - b.x);

  const radii = [0];
  for (let depth = 1; depth <= maxDepth; depth++) {
    const nodes = byDepth[depth] || [];
    let maxPairR = 0;

    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      const b = nodes[(i + 1) % nodes.length];
      const gap = i === nodes.length - 1 ? (TWO_PI - a.x + b.x) : (b.x - a.x);
      if (nodes.length === 1 || gap <= 0) continue;

      const halfW = (a._bw + b._bw) / 2 + TANG_GAP;
      const halfH = (a._bh + b._bh) / 2 + TANG_GAP;
      const need = Math.sqrt(halfW * halfW + halfH * halfH);
      const r = need / (2 * Math.sin(gap / 2));
      if (isFinite(r) && r > maxPairR) maxPairR = r;
    }

    const radial = radii[depth - 1] + maxH + RADIAL_GAP;
    radii[depth] = Math.max(maxPairR, radial);
  }
  return radii;
}

function renderGraph(fit) {
  if (!svg) initGraph();

  gLinks.selectAll("*").remove();
  gNodes.selectAll("*").remove();

  if (!treeData || !treeData.name) return;

  const d3Data = toD3Data(treeData);
  const root = d3.hierarchy(d3Data);

  computeBubbleSizes(root);

  const treeLayout = d3.tree()
    .size([2 * Math.PI, 1])
    .separation((a, b) => (a.parent === b.parent ? 1.6 : 2.6));

  treeLayout(root);
  const levelRadius = computeLevelRadii(root);
  root.descendants().forEach(d => { d.y = levelRadius[d.depth]; });

  const linkGen = d3.linkRadial()
    .angle(d => d.x)
    .radius(d => d.y);

  gLinks.selectAll("path")
    .data(root.links())
    .join("path")
    .attr("class", "link")
    .attr("d", linkGen);

  const nodeGroups = gNodes.selectAll("g")
    .data(root.descendants())
    .join("g")
    .attr("data-id", d => d.data._id)
    .attr("transform", d => `translate(${d.y * Math.sin(d.x)},${-d.y * Math.cos(d.x)})`);

  nodeGroups.each(function(d) {
    const g = d3.select(this);
    const isRoot = d.depth === 0;
    const selected = d.data._id === selectedNodeId;
    const lines = d._lines;
    const bw = d._bw;
    const bh = d._bh;

    g.append("rect")
      .attr("class", "node-bubble")
      .attr("x", -bw / 2)
      .attr("y", -bh / 2)
      .attr("width", bw)
      .attr("height", bh)
      .attr("rx", 8)
      .attr("ry", 8)
      .attr("fill", isRoot ? "#2c3e50" : (d.children ? "#3498db" : "#95a5a6"))
      .attr("stroke", selected ? "#e74c3c" : "#fff")
      .attr("stroke-width", selected ? 3 : 1.5)
      .on("click", (e) => {
        e.stopPropagation();
        activePane = "graph";
        selectNode(d.data._id);
        expandPathTo(d);
      })
      .on("dblclick", (e) => {
        e.stopPropagation();
        e.preventDefault();
        activePane = "graph";
        selectNode(d.data._id);
        startGraphEdit(d.data._id);
      })
      .on("contextmenu", (e) => {
        e.preventDefault();
        e.stopPropagation();
        activePane = "graph";
        selectNode(d.data._id);
        showContextMenu(e.clientX, e.clientY, d.data._id, "graph");
      });

    const text = g.append("text")
      .attr("class", "node-text")
      .attr("y", -(lines.length - 1) * LINE_H / 2);

    lines.forEach((line, i) => {
      text.append("tspan")
        .attr("x", 0)
        .attr("dy", i === 0 ? 0 : LINE_H)
        .text(line);
    });
  });

  if (fit) fitGraph();
}

function fitGraph() {
  if (!gZoom || !svg) return;
  const svgEl = document.getElementById("graph-svg");
  const width = svgEl.clientWidth;
  const height = svgEl.clientHeight;
  if (!width || !height) return;
  const bbox = gZoom.node().getBBox();
  if (!isFinite(bbox.width) || bbox.width === 0 || !isFinite(bbox.height) || bbox.height === 0) return;
  const PAD = 60;
  const scale = Math.min((width - PAD * 2) / bbox.width, (height - PAD * 2) / bbox.height);
  const s = Math.max(0.2, Math.min(scale, 5));
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;
  const tx = width / 2 - cx * s;
  const ty = height / 2 - cy * s;
  svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(s));
}

function highlightGraphNode(id) {
  if (!gNodes) return;
  gNodes.selectAll("g").each(function(d) {
    const g = d3.select(this);
    const selected = d.data._id === id;
    g.select("rect")
      .attr("stroke", selected ? "#e74c3c" : "#fff")
      .attr("stroke-width", selected ? 3 : 1.5);
  });
}

function expandPathTo(d) {
  let changed = false;
  let current = d.parent;
  while (current) {
    const orig = findNode(current.data._id);
    if (orig && !orig._expanded) {
      orig._expanded = true;
      changed = true;
    }
    current = current.parent;
  }
  if (changed) renderTreeEditor();
}

/* ── Shared Editing Operations ───────────────────── */
function findParent(node, id) {
  if (!node._children) return null;
  if (node._children.some(c => c._id === id)) return node;
  for (const c of node._children) {
    const r = findParent(c, id);
    if (r) return r;
  }
  return null;
}

function countDescendants(node) {
  let ret = 0;
  (function walk(n) {
    if (n._children) for (const c of n._children) { ret++; walk(c); }
  })(node);
  return ret;
}

function addChild(node, opts) {
  const editIn = (opts && opts.editIn) || "tree";
  const child = { name: "New node", children: [], _id: generateId(), _expanded: true, _children: [] };
  node._children.push(child);
  node._expanded = true;
  nodeMap.set(child._id, child);
  renderTreeEditor();
  renderGraph();
  selectNode(child._id);
  startEdit(child._id, editIn);
}

function addSibling(node, opts) {
  const editIn = (opts && opts.editIn) || "tree";
  if (node === treeData) { addChild(node, opts); return; }
  const parent = findParent(treeData, node._id);
  if (!parent) { addChild(node, opts); return; }
  const idx = parent._children.indexOf(node);
  const sib = { name: "New node", children: [], _id: generateId(), _expanded: true, _children: [] };
  parent._children.splice(idx + 1, 0, sib);
  nodeMap.set(sib._id, sib);
  renderTreeEditor();
  renderGraph();
  selectNode(sib._id);
  startEdit(sib._id, editIn);
}

function deleteNodeWithConfirm(node) {
  if (node._children && node._children.length > 0) {
    const n = countDescendants(node);
    if (!window.confirm('Delete "' + node.name + '" and ' + n + ' descendant' + (n === 1 ? "" : "s") + "?")) return;
  }
  const parent = deleteNode(node._id);
  renderTreeEditor();
  renderGraph();
  if (parent) selectNode(parent._id);
}

/* ── Inline Editing (tree + graph) ────────────────── */
function selectAllContent(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function startEdit(nodeId, where) {
  if (where === "graph") { startGraphEdit(nodeId); return; }
  const label = document.querySelector('.tree-node[data-id="' + nodeId + '"] .tree-label');
  if (!label) return;
  label.focus();
  selectAllContent(label);
}

function startGraphEdit(nodeId) {
  const node = findNode(nodeId);
  if (!node) return;
  const gEl = gNodes.select('g[data-id="' + nodeId + '"]').node();
  if (!gEl) return;
  const rect = gEl.querySelector("rect");
  if (!rect) return;
  const r = rect.getBoundingClientRect();
  const pane = document.getElementById("graph-pane");
  const pr = pane.getBoundingClientRect();
  const input = document.getElementById("graph-edit-input");
  input.style.display = "block";
  input.style.left = (r.left - pr.left) + "px";
  input.style.top = (r.top - pr.top) + "px";
  input.style.width = r.width + "px";
  input.style.height = r.height + "px";
  input.value = node.name;
  input.dataset.nodeId = nodeId;
  input.focus();
  input.select();
}

function commitGraphEdit() {
  const input = document.getElementById("graph-edit-input");
  const nodeId = input.dataset.nodeId;
  if (!nodeId) { hideGraphEdit(); return; }
  const node = findNode(nodeId);
  const v = input.value.trim();
  hideGraphEdit();
  if (node && v) {
    node.name = v;
    renderGraph();
    selectNode(nodeId);
  }
}

function hideGraphEdit() {
  const input = document.getElementById("graph-edit-input");
  input.style.display = "none";
  input.dataset.nodeId = "";
}

/* ── Keyboard Navigation ─────────────────────────── */
function getVisibleNodes() {
  const ret = [];
  (function walk(n) {
    ret.push(n);
    if (n._expanded && n._children) for (const c of n._children) walk(c);
  })(treeData);
  return ret;
}

function scrollTreeNodeIntoView(id) {
  const row = document.querySelector('.tree-node[data-id="' + id + '"]');
  if (row) row.scrollIntoView({ block: "nearest" });
}

function moveSelection(dir) {
  const nodes = getVisibleNodes();
  const idx = nodes.findIndex(n => n._id === selectedNodeId);
  if (idx === -1) { if (nodes.length) selectNode(nodes[0]._id); return; }
  const ni = idx + dir;
  if (ni < 0 || ni >= nodes.length) return;
  selectNode(nodes[ni]._id);
  scrollTreeNodeIntoView(nodes[ni]._id);
}

function collapseOrParent(node) {
  if (node._expanded && node._children && node._children.length > 0) {
    node._expanded = false;
    renderTreeEditor();
    renderGraph();
    return;
  }
  const parent = findParent(treeData, node._id);
  if (parent) { selectNode(parent._id); scrollTreeNodeIntoView(parent._id); }
}

function expandOrChild(node) {
  if (node._children && node._children.length > 0) {
    if (!node._expanded) {
      node._expanded = true;
      renderTreeEditor();
      renderGraph();
      return;
    }
    selectNode(node._children[0]._id);
    scrollTreeNodeIntoView(node._children[0]._id);
  }
}

/* ── Context Menu ────────────────────────────────── */
function showContextMenu(x, y, nodeId, where) {
  const node = findNode(nodeId);
  if (!node) return;
  selectNode(nodeId);
  const menu = document.getElementById("context-menu");
  menu.innerHTML = "";
  const items = [];
  items.push({ label: "Add child", fn: () => addChild(node, { editIn: where }) });
  if (node !== treeData) items.push({ label: "Add sibling", fn: () => addSibling(node, { editIn: where }) });
  items.push({ label: "Rename", fn: () => startEdit(nodeId, where) });
  if (node !== treeData) items.push({ label: "Delete", fn: () => deleteNodeWithConfirm(node), danger: true });
  items.forEach(it => {
    const el = document.createElement("div");
    el.className = "context-menu-item" + (it.danger ? " danger" : "");
    el.textContent = it.label;
    el.addEventListener("click", () => { hideContextMenu(); it.fn(); });
    menu.appendChild(el);
  });
  menu.style.display = "block";
  menu.style.left = "0px";
  menu.style.top = "0px";
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  menu.style.left = Math.min(x, window.innerWidth - mw - 4) + "px";
  menu.style.top = Math.min(y, window.innerHeight - mh - 4) + "px";
}

function hideContextMenu() {
  document.getElementById("context-menu").style.display = "none";
}

/* ── Resize Handle ───────────────────────────────── */
(function initResize() {
  const handle = document.getElementById("resize-handle");
  const treePane = document.getElementById("tree-pane");
  let startX, startWidth;

  handle.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    startWidth = treePane.offsetWidth;
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  function onMove(e) {
    const newWidth = Math.max(200, startWidth + e.clientX - startX);
    treePane.style.width = newWidth + "px";
  }

  function onUp() {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    renderGraph();
  }
})();

/* ── Export ───────────────────────────────────────── */
document.getElementById("export-btn").addEventListener("click", () => {
  const yaml = serializeYaml(treeData);
  const blob = new Blob([yaml], { type: "text/yaml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "components.yml";
  a.click();
  URL.revokeObjectURL(url);
});

/* ── Fit View Button ─────────────────────────────── */
document.getElementById("fit-btn").addEventListener("click", () => fitGraph());

/* ── Add Root Button ──────────────────────────────── */
document.getElementById("add-root-btn").addEventListener("click", () => {
  if (treeData && treeData._children && treeData._children.length > 0) return;
  if (!treeData || !treeData.name) {
    treeData = { name: "Data", children: [], _id: generateId(), _expanded: true, _children: [] };
    nodeMap.set(treeData._id, treeData);
  }
  renderTreeEditor();
  renderGraph();
  selectNode(treeData._id);
  startEdit(treeData._id, "tree");
});

/* ── Global Interaction (keyboard + menus + graph input) ─ */
(function initInteraction() {
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { hideContextMenu(); hideGraphEdit(); return; }
    const ae = document.activeElement;
    const editing = ae && (ae.isContentEditable || ae.tagName === "INPUT" || ae.tagName === "TEXTAREA");
    if (editing) return;
    if (!selectedNodeId) return;
    const node = findNode(selectedNodeId);
    if (!node) return;
    const editIn = activePane;
    switch (e.key) {
      case "Tab": e.preventDefault(); addChild(node, { editIn }); break;
      case "Enter": e.preventDefault(); addSibling(node, { editIn }); break;
      case "Delete":
      case "Backspace": e.preventDefault(); deleteNodeWithConfirm(node); break;
      case "F2": e.preventDefault(); startEdit(selectedNodeId, editIn); break;
      case "ArrowUp": e.preventDefault(); moveSelection(-1); break;
      case "ArrowDown": e.preventDefault(); moveSelection(1); break;
      case "ArrowLeft": e.preventDefault(); collapseOrParent(node); break;
      case "ArrowRight": e.preventDefault(); expandOrChild(node); break;
    }
  });

  document.addEventListener("click", (e) => {
    const menu = document.getElementById("context-menu");
    if (!menu.contains(e.target)) hideContextMenu();
  });

  document.addEventListener("contextmenu", (e) => {
    const menu = document.getElementById("context-menu");
    if (!menu.contains(e.target)) hideContextMenu();
  });

  const input = document.getElementById("graph-edit-input");
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      const id = input.dataset.nodeId;
      const node = findNode(id);
      commitGraphEdit();
      if (node) addSibling(node, { editIn: "graph" });
    } else if (e.key === "Tab") {
      e.preventDefault();
      const id = input.dataset.nodeId;
      const node = findNode(id);
      commitGraphEdit();
      if (node) addChild(node, { editIn: "graph" });
    } else if (e.key === "Escape") {
      e.preventDefault();
      hideGraphEdit();
    }
  });
  input.addEventListener("blur", () => commitGraphEdit());
  input.addEventListener("mousedown", (e) => e.stopPropagation());
})();

/* ── Init ────────────────────────────────────────── */
async function init() {
  try {
    const resp = await fetch(YAML_URL);
    const text = await resp.text();
    treeData = parseYaml(text);
    assignIds(treeData);
    renderTreeEditor();
    if (treeData && treeData._id) selectNode(treeData._id);
    setTimeout(() => { initGraph(); renderGraph(true); }, 50);
  } catch (err) {
    document.getElementById("tree-content").innerHTML =
      '<div class="empty-state">Failed to load components.yml<br><small>' + err.message + "</small></div>";
  }
}

window.addEventListener("resize", () => { renderGraph(); });
init();
</script>
